name: Verify
on:
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install node & pnpm dependencies
        uses: ./.github/actions/install

      - name: Lint code
        run: pnpm lint

  format:
    name: Format
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install node & pnpm dependencies
        uses: ./.github/actions/install

      - name: Check formatting
        run: pnpm exec oxfmt --check .

  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install node & pnpm dependencies
        uses: ./.github/actions/install

      - name: Test
        run: pnpm test
